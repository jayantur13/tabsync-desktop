name: Build and Attach Windows Assets
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile Windows Binaries
        run: npm run make:win

      - name: Upload Windows Assets to Existing Draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use native PowerShell tools to recursively locate files safely on Windows
          $files = Get-ChildItem -Path out/make/ -Recurse -Include *.zip, *.exe, *.msi | Select-Object -ExpandProperty FullName
          
          if ($files.Count -eq 0) {
              Write-Error "❌ No binaries found in out/make/ to upload!"
              exit 1
          }

          Write-Host "📦 Found files to upload: $files"

          # Use GitHub CLI natively to pin these files directly under the existing tag release
          gh release upload ${{ github.ref_name }} $files --clobber