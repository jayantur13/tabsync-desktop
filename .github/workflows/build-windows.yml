name: Build and Attach Windows Assets
on:
  push:
    tags:
      - 'v*'

# ✨ ADD THIS PERMISSIONS BLOCK RIGHT HERE ✨
permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Updated to Node 22 to clear that deprecation warning!
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile Windows Binaries
        run: npm run make:win

      - name: Upload Windows Assets to Existing Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }} 
          draft: true
          prerelease: false
          append_body: true
          files: |
            out/make/**/*.zip
            out/make/**/*.exe
            out/make/**/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}