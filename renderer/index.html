<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TabSync - Local Browser Sync</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-main: #f8fafc;
            --bg-panel: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --github: #24292f;
            --coffee: #ffdd00;
            --radius: 12px;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
            flex: 1;
            width: 100%;
            box-sizing: border-box;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1.25rem;
            margin-bottom: 1.5rem;
        }

        h2 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.03em;
        }

        .header-meta {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        #status {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: var(--bg-panel);
            padding: 0.4rem 0.8rem;
            border-radius: 30px;
            border: 1px solid var(--border);
        }

        #external {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 2rem;
            background: #f1f5f9;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            display: inline-block;
            align-self: center;
        }

        #external a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        #external a:hover {
            text-decoration: underline;
        }

        #addUrlForm {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2.5rem;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            padding: 0.375rem;
            border-radius: var(--radius);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        #addUrlForm:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        input {
            flex: 1;
            padding: 0.625rem 0.875rem;
            border: none;
            background: transparent;
            font-size: 0.95rem;
            outline: none;
            color: var(--text-main);
        }

        .btn-main {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.625rem 1.5rem;
            border-radius: calc(var(--radius) - 4px);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-main:hover {
            background: var(--primary-hover);
        }

        /* Unified Dashboard Panel Layout */
        .dashboard-panel {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        #devices {
            display: grid;
            grid-template-columns: 1fr;
        }

        #devices:empty::after {
            content: "No devices connected yet. Searching for device..";
            display: block;
            padding: 3rem 1.5rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .device {
            padding: 1.75rem;
            box-sizing: border-box;
        }

        .device:not(:last-child) {
            border-bottom: 1px solid var(--border);
        }

        .device h3 {
            margin: 0 0 1.25rem 0;
            font-size: 0.95rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        .tabs {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        /* Action styling for lists */
        .tab-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem;
            border-radius: 8px;
            transition: background 0.15s;
            gap: 1rem;
        }

        .tab-row:hover {
            background: var(--bg-main);
        }

        .tab-link {
            text-decoration: none;
            color: var(--text-main);
            font-size: 0.95rem;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }

        .tab-link:hover {
            color: var(--primary);
        }

        .btn-group {
            display: flex;
            gap: 0.375rem;
        }

        .action-btn {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.375rem 0.75rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }

        .action-btn:hover {
            background: var(--bg-main);
            border-color: var(--text-muted);
        }

        /* Support Footer */
        footer {
            background: var(--bg-panel);
            border-top: 1px solid var(--border);
            padding: 1.5rem 1rem;
            text-align: center;
            margin-top: auto;
        }

        .footer-content {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .footer-text {
            font-size: 0.875rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .footer-links {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .support-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.85rem;
            border-radius: 8px;
            font-size: 0.825rem;
            font-weight: 600;
            text-decoration: none;
            transition: background 0.15s;
        }

        .btn-github {
            background: #f1f5f9;
            color: var(--text-main);
        }

        .btn-github:hover {
            background: #e2e8f0;
        }

        .btn-sponsor {
            background: #fef2f2;
            color: #ef4444;
        }

        .btn-sponsor:hover {
            background: #fee2e2;
        }

        .btn-coffee {
            background: #fffbeb;
            color: #b45309;
            border: 1px solid #fde68a;
        }

        .btn-coffee:hover {
            background: #fef3c7;
        }

        @media (min-width: 640px) {
            #devices {
                grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            }

            .device:not(:last-child) {
                border-bottom: none;
                border-right: 1px solid var(--border);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h2>🧩 TabSync Local</h2>
            <div class="header-meta">
                <div id="status">Connecting...</div>
            </div>
        </header>

        <div style="display: flex; flex-direction: column;">
            <div id="external">
                Server Address: <a id="serverLink" href="#" target="_blank">Loading...</a>
            </div>
        </div>

        <div id="update-banner"
            style="display: none; background: #e0f2fe; border: 1px solid #bae6fd; padding: 12px 16px; border-radius: var(--radius); margin-bottom: 1.5rem; font-size: 0.9rem; color: #0369a1;">
            <div
                style="display: flex; justify-content: space-between; align-items: center; font-weight: 500; margin-bottom: 6px;">
                <span id="update-text">Downloading an application update...</span>
                <span id="update-percent" style="font-variant-numeric: tabular-nums;">0%</span>
            </div>
            <progress id="update-progress-bar" value="0" max="100"
                style="width: 100%; height: 6px; border-radius: 4px; overflow: hidden; appearance: none;"></progress>
        </div>

        <form id="addUrlForm">
            <input type="text" id="urlInput" placeholder="Paste a URL to sync..." required />
            <button type="submit" class="btn-main">Sync Link</button>
        </form>

        <div class="dashboard-panel">
            <div id="devices"></div>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <div class="footer-text">Support open development!</div>
            <div class="footer-links">
                <a href="https://play.google.com/store/apps/dev?id=5254368937973952121&hl=en_IN" target="_blank"
                    class="support-btn btn-github">

                        stroke="currentColor" fill="none">

                        <line x1="12.36" y1="10.67" x2="42.07" y2="38.02" />
                        <line x1="12.36" y1="53.33" x2="41.24" y2="25.35" />
                    </svg>
                    Android Apps
                </a>
                <a href="https://github.com/jayantur13/tabsync-desktop" target="_blank" class="support-btn btn-github">

                    Tabsync Desktop
                </a>
                <a href="https://github.com/sponsors/jayantur13" target="_blank" class="support-btn btn-sponsor">
                    <svg height="14" width="14" viewBox="0 0 24 24" fill="currentColor"

                    </svg>
                    Buy Coffee
                </a>
            </div>
        </div>
    </footer>

    <script>
        let deviceId =
            localStorage.getItem("deviceId") ||
            `device-${Math.random().toString(36).slice(2, 8)}`;
        localStorage.setItem("deviceId", deviceId);

        let ws;
        let serverIP = null;
        let backendPort = null;
        const devicesDiv = document.getElementById("devices");
        const statusEl = document.getElementById("status");

        async function init() {
            try {
                const isElectron = !!window.tabsync;
                console.log("🌍 Environment:", isElectron ? "Electron" : "Web");

                if (isElectron) {
                    const config = await window.tabsync.getConfig();
                    backendPort = config.port || 3210;
                } else {
                    backendPort = localStorage.getItem("tabsync_port") || 3210;
                }

                console.log("🧠 Using backend port:", backendPort);

                const originHost = location.hostname || "localhost";
                const res = await fetch(`http://${originHost}:${backendPort}/ip`);
                const data = await res.json();

                serverIP = data.ip;
                const serverURL = `http://${serverIP}:${backendPort}`;

                const serverLink = document.getElementById("serverLink");
                serverLink.textContent = serverURL;
                serverLink.href = serverURL;

                serverLink.addEventListener("click", (e) => {
                    if (isElectron) {
                        e.preventDefault();
                        window.electronAPI.openExternal(serverURL);
                    }
                });

                localStorage.setItem("tabsync_port", backendPort);

                const wsUrl = `ws://${data.ip}:${data.wsPort}`;
                ws = new WebSocket(wsUrl);

                ws.onopen = () => (statusEl.textContent = "✅ Connected");
                ws.onclose = () => (statusEl.textContent = "⚠️ Disconnected");
                ws.onmessage = (e) => renderDevices(JSON.parse(e.data));
            } catch (err) {
                console.error("Failed to init:", err);
                document.getElementById("serverLink").textContent = "Not running";
                statusEl.textContent = "❌ Connection Failed";

                const portInput = prompt(
                    "Server not reachable. Enter TabSync port (default 3210):",
                    backendPort || 3210
                );
                if (portInput) {
                    localStorage.setItem("tabsync_port", portInput);
                    location.reload();
                }
            }
        }

        function renderDevices(devices) {
            devicesDiv.innerHTML = "";

            for (const [id, tabs] of Object.entries(devices)) {
                const deviceEl = document.createElement("div");
                deviceEl.className = "device";

                const title =
                    id === deviceId
                        ? `💻 ${id} (You)`
                        : id.startsWith("device-")
                            ? `📱 ${id}`
                            : id;

                deviceEl.innerHTML = `<h3>${title}</h3><div class="tabs"></div>`;
                const tabsDiv = deviceEl.querySelector(".tabs");

                const sortedTabs = [...tabs].sort((a, b) => (a.title || "").localeCompare(b.title || ""));

                sortedTabs.forEach((tab) => {
                    const container = document.createElement("div");
                    container.className = "tab-row";

                    const a = document.createElement("a");
                    a.className = "tab-link";
                    a.href = tab.url;
                    a.target = "_blank";
                    a.textContent = tab.title || tab.url;
                    a.title = tab.title ? `${tab.title}\n(${tab.url})` : tab.url;

                    const btnGroup = document.createElement("div");
                    btnGroup.className = "btn-group";

                    const openBtn = document.createElement("button");
                    openBtn.innerText = "Open";
                    openBtn.type = "button";
                    openBtn.className = "action-btn";

                    openBtn.addEventListener("click", () => {
                        try {
                            if (window.electronAPI?.openExternal) {
                                window.electronAPI.openExternal(tab.url);
                            } else {
                                window.open(tab.url, "_blank");
                            }
                        } catch (err) {
                            console.error("Failed to open URL:", err);
                        }
                    });

                    btnGroup.appendChild(openBtn);

                    const isElectron = !!window.tabsync;
                    if (isElectron) {
                        const copy = document.createElement("button");
                        copy.innerText = "Copy";
                        copy.type = "button";
                        copy.className = "action-btn";

                        copy.addEventListener("click", async () => {
                            try {
                                await navigator.clipboard.writeText(tab.url);
                                copy.innerText = "Copied!";
                                setTimeout(() => (copy.innerText = "Copy"), 1000);
                            } catch (err) {
                                console.error("Failed to copy text:", err);
                                copy.innerText = "Failed";
                                setTimeout(() => (copy.innerText = "Copy"), 1000);
                            }
                        });
                        btnGroup.appendChild(copy);
                    }

                    container.appendChild(a);
                    container.appendChild(btnGroup);
                    tabsDiv.appendChild(container);
                });

                devicesDiv.appendChild(deviceEl);
            }
        }

        document.getElementById("addUrlForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const urlInput = document.getElementById("urlInput");
            let url = urlInput.value.trim();
            if (!url) return;

            if (!url.startsWith("http")) url = "https://" + url;

            try {
                const originHost = location.hostname || "localhost";
                const res = await fetch(`http://${originHost}:${backendPort}/add`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ deviceId, url }),
                });

                const data = await res.json();
                if (data.success) {
                    statusEl.textContent = `✅ Added: ${data.title || 'Link'}`;
                    urlInput.value = "";
                } else {
                    statusEl.textContent = "❌ Failed to add URL";
                }
            } catch (err) {
                console.error("Add URL error:", err);
                statusEl.textContent = "⚠️ Server not reachable";
            }
        });

        init();

        /* ==========================================
             ELECTRON UPDATER INTERACTION LOGIC 
         ========================================== */
        if (window.electronAPI && window.electronAPI.onUpdateStatus) {
            const banner = document.getElementById('update-banner');
            const text = document.getElementById('update-text');
            const percentLabel = document.getElementById('update-percent');
            const progressBar = document.getElementById('update-progress-bar');

            window.electronAPI.onUpdateStatus((data) => {
                if (data.status === 'downloading') {
                    banner.style.display = 'block';
                    text.innerText = "📥 Downloading background update...";
                    percentLabel.innerText = `${data.percent}%`;
                    progressBar.value = data.percent;
                } else if (data.status === 'ready') {
                    banner.style.display = 'block';
                    text.innerText = "✨ Update downloaded and ready!";
                    percentLabel.innerText = "100%";
                    progressBar.value = 100;
                    banner.style.background = "#dcfce7";
                    banner.style.borderColor = "#bbf7d0";
                    banner.style.color = "#15803d";
                } else if (data.status === 'error') {
                    text.innerText = "❌ Update failed to download.";
                    percentLabel.innerText = "";
                    banner.style.background = "#fee2e2";
                    banner.style.borderColor = "#fecaca";
                    banner.style.color = "#b91c1c";
                    setTimeout(() => { banner.style.display = 'none'; }, 6000);
                }
            });
        }
    </script>
</body>

</html>
