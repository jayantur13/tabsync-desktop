<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TabSync Settings</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --bg-main: #f8fafc;
      --bg-panel: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius: 12px;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-main);
      color: var(--text-main);
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
    }

    .settings-card {
      max-width: 450px;
      margin: 3rem auto;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      padding: 2rem;
      box-sizing: border-box;
    }

    h2 {
      margin: 0 0 1.5rem 0;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.75rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group-inline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    label {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text-main);
      cursor: pointer;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      user-select: none;
    }

    input[type="number"] {
      width: 90px;
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-main);
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="number"]:focus {
      border-color: var(--primary);
    }

    input[type="checkbox"] {
      width: 1rem;
      height: 1rem;
      accent-color: var(--primary);
      cursor: pointer;
    }

    button {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      padding: 0.75rem 1.25rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      margin-top: 1rem;
      transition: background 0.15s;
    }

    button:hover {
      background: var(--primary-hover);
    }
  </style>
</head>

<body>
  <div class="settings-card">
    <h2>⚙️ TabSync Settings</h2>

    <div class="form-group form-group-inline">
      <label d="portLabel" for="port">Server Port</label>
      <input id="port" type="number" min="1000" max="65535" value="3210" />
    </div>

    <div class="form-group">
      <label class="checkbox-label">
        <input id="autoLaunch" type="checkbox" />
        <span>Launch on system startup</span>
      </label>
    </div>

    <div class="form-group">
      <label class="checkbox-label">
        <input id="minimizeToTray" type="checkbox" />
        <span>Minimize to tray on close</span>
      </label>
    </div>

    <button id="save">Save & Restart</button>
  </div>

  <script src="settings.js"></script>
</body>

</html>
